schema_version: 5
targets:
  T1:
    name: sqldeep reaches v1.0.0 with all syntax and API surfaces declared stable
    status: converging
    value: 13.0
    cost: 3.0
    acceptance:
    - All items in STABILITY.md are marked Stable (no Experimental or Needs review remaining)
    - STABILITY.md Gaps and prerequisites section is resolved or moved to Out of scope
    - Settling threshold met (N consecutive minor releases with zero breaking changes)
    - Version macros in sqldeep.h read 1.0.0
    - sqldeep_version() returns 1.0.0
    - 'GitHub issue #10 is closed (resolved by computed key syntax)'
    - Tagged release v1.0.0 exists on GitHub
    context: v0.7.0 introduced Experimental items (SQL comments, -> FROM-context restriction, ->> passthrough) and a breaking change (removed // comments). v0.8.0 adds recursive select (also Experimental). The settling clock requires these features to prove out through real-world usage before promotion to Stable. Currently at v0.21.0 with ~45 Experimental items across C API, Go/Swift/Kotlin bindings, input syntax, output semantics, and parser behaviour.
    origin: targets.md bootstrap
    discovered: 2026-04-08
  T2:
    name: Recursive tree construction from self-referential tables
    status: achieved
    value: 8.0
    cost: 3.0
    actual_cost: 3.0
    acceptance:
    - Parser, renderer, both backends, singular/forest modes, explicit PK, integration tests with 3+ levels, transpilation tests
    context: Achieved 2026-03-15 (commit 149089b). All criteria met.
    origin: targets.md bootstrap
    discovered: 2026-04-08
    achieved: 2026-04-08
  T3:
    name: XML/HTML literals produce well-formed markup directly from SQL queries
    status: achieved
    value: 8.0
    cost: 5.0
    actual_cost: 5.0
    acceptance:
    - XML element transpilation, interpolation, subqueries, self-closing, namespaced tags, boolean attributes, JSON interop, both backends, transpilation and integration tests
    context: Achieved 2026-04-05 (v0.9.0). All criteria met.
    origin: targets.md bootstrap
    discovered: 2026-04-08
    achieved: 2026-04-08
  T4:
    name: xml_to_jsonml() transpiler macro converts XML literals to JSONML output
    status: achieved
    value: 5.0
    cost: 3.0
    actual_cost: 3.0
    acceptance:
    - JSONML transpilation, nested elements, attributes, text children, empty elements, subquery aggregation, BLOB protocol, function registration, transpilation and integration tests
    context: Achieved 2026-04-05 (v0.12.0). All criteria met.
    origin: targets.md bootstrap
    discovered: 2026-04-08
    achieved: 2026-04-08
  T5:
    name: SQLite-backend transpile parses input via deepparser AST instead of the hand-written parser
    status: achieved
    value: 0.0
    cost: 0.0
    actual_cost: 5.0
    acceptance:
    - sqldeep_transpile_backend(SQLDEEP_SQLITE) parses input via lp_parse_all and walks the resulting AST to produce output, instead of the hand-written recursive-descent parser in dist/sqldeep.cpp
    - sqldeep_transpile_backend(SQLDEEP_SQLITE_VANILLA) shares the deepparser-based path with a different JSON-function emitter table
    - The CTE input 'WITH s AS (SELECT COUNT(*) AS c FROM messages) SELECT c FROM s' round-trips through Transpile unchanged (modulo whitespace canonicalization)
    - 'Existing tests in tests/test_transpile.cpp and tests/test_sqlite.cpp pass (expected outputs may be updated to match deepparser canonical SQL form: normalised whitespace, comma-joins expanded to INNER JOIN, etc.)'
    - The hand-written parser remains in the codebase only for the PostgreSQL backend (marked as legacy path in STABILITY.md and source); SQLite paths route through deepparser exclusively
    - Plain-SQL forms not previously supported (window functions, lateral joins, CTEs, RETURNING with extras, etc.) round-trip via the SQLite backend without errors
    context: 'Replaces the original ''fix the CTE paren bug'' framing. The CTE bug (unmatched paren on plain SQL) was a symptom of sqldeep''s hand-written parser doing partial parsing — scanning tokens for sqldeep triggers while approximately tracking SQL state. Every exotic plain-SQL form (windows, lateral, etc.) is a latent bug of the same shape. The durable fix is a real SQL parser. After evaluating options, decision was to fork sqliteai/liteparser as marcelocantos/deepparser (vendored as submodule at vendor/deepparser/), extend its Lemon grammar with sqldeep productions, and replace sqldeep parser entirely for SQLite backends. PG backend stays on the hand-written parser for now (separately tracked, sqldeep PG path is unused). See vendor/deepparser/bullseye.yaml T1 for the deepparser-side work: grammar extensions, AST kinds, unparse handlers, round-trip parity.'
    origin: manual
    discovered: 2026-05-13
    achieved: 2026-05-20
