# SQLite integration test data.
# Shared across all language bindings.
#
# Schema:
#   name:     test name
#   setup:    list of SQL statements to execute before the test (DDL + inserts)
#   input:    sqldeep input to transpile and execute (mutually exclusive with raw_sql/steps)
#   fks:      optional FK metadata for fk-guided transpilation
#   raw_sql:  raw SQL to execute directly (no transpilation)
#   steps:    list of {transpile_exec: ...} or {transpile_query: ...} steps
#   expected: list of expected result rows (strings); always an array
#   expected_contains: list of substrings that must all appear in the single result row

# ── Single-table tests ──────────────────────────────────────────────

- name: "basic object select"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY, name TEXT)"
    - "INSERT INTO t VALUES(1, 'alice')"
    - "INSERT INTO t VALUES(2, 'bob')"
  input: "SELECT { id, name } FROM t ORDER BY id"
  expected:
    - '{"id":1,"name":"alice"}'
    - '{"id":2,"name":"bob"}'

- name: "renamed field"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY, val TEXT)"
    - "INSERT INTO t VALUES(1, 'x')"
  input: "SELECT { item_id: id, value: val } FROM t"
  expected:
    - '{"item_id":1,"value":"x"}'

- name: "inline array"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY)"
    - "INSERT INTO t VALUES(1)"
  input: "SELECT { id, tags: [10, 20, 30] } FROM t"
  expected:
    - '{"id":1,"tags":[10,20,30]}'

- name: "expression with function call"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY, a TEXT, b TEXT)"
    - "INSERT INTO t VALUES(1, NULL, 'fallback')"
  input: "SELECT { id, v: coalesce(a, b) } FROM t"
  expected:
    - '{"id":1,"v":"fallback"}'

# ── Nested subquery tests ───────────────────────────────────────────

- name: "two-level object nesting"
  setup:
    - "CREATE TABLE customers(id INTEGER PRIMARY KEY, name TEXT)"
    - "CREATE TABLE orders(id INTEGER PRIMARY KEY, cid INTEGER, total REAL)"
    - "INSERT INTO customers VALUES(1, 'alice')"
    - "INSERT INTO orders VALUES(10, 1, 99.5)"
    - "INSERT INTO orders VALUES(11, 1, 42.0)"
  input: |
    SELECT {
        id, name,
        orders: SELECT { order_id: id, total } FROM orders
                WHERE cid = c.id ORDER BY id,
    } FROM customers c
  expected:
    - '{"id":1,"name":"alice","orders":[{"order_id":10,"total":99.5},{"order_id":11,"total":42.0}]}'

- name: "two-level array subquery"
  setup:
    - "CREATE TABLE customers(id INTEGER PRIMARY KEY, name TEXT)"
    - "CREATE TABLE orders(id INTEGER PRIMARY KEY, cid INTEGER, total REAL)"
    - "INSERT INTO customers VALUES(1, 'alice')"
    - "INSERT INTO orders VALUES(10, 1, 99.5)"
    - "INSERT INTO orders VALUES(11, 1, 42.0)"
  input: |
    SELECT {
        name,
        totals: SELECT [total] FROM orders
                WHERE cid = c.id ORDER BY id,
    } FROM customers c
  expected:
    - '{"name":"alice","totals":[99.5,42.0]}'

- name: "three-level nesting"
  setup:
    - "CREATE TABLE people(id INTEGER PRIMARY KEY, name TEXT)"
    - "CREATE TABLE orders(id INTEGER PRIMARY KEY, pid INTEGER)"
    - "CREATE TABLE items(id INTEGER PRIMARY KEY, oid INTEGER, name TEXT, qty INTEGER)"
    - "INSERT INTO people VALUES(1, 'alice')"
    - "INSERT INTO orders VALUES(10, 1)"
    - "INSERT INTO items VALUES(100, 10, 'widget', 3)"
    - "INSERT INTO items VALUES(101, 10, 'gadget', 1)"
  input: |
    SELECT {
        id, name,
        orders: SELECT {
            order_id: id,
            items: SELECT {
                item: name,
                qty,
            } FROM items i WHERE oid = o.id ORDER BY i.id,
        } FROM orders o WHERE pid = p.id ORDER BY o.id,
    } FROM people p
  expected:
    - '{"id":1,"name":"alice","orders":[{"order_id":10,"items":[{"item":"widget","qty":3},{"item":"gadget","qty":1}]}]}'

# ── Mixed nesting ───────────────────────────────────────────────────

- name: "mixed array and object nesting"
  setup:
    - "CREATE TABLE customers(id INTEGER PRIMARY KEY, name TEXT)"
    - "CREATE TABLE orders(id INTEGER PRIMARY KEY, cid INTEGER)"
    - "CREATE TABLE items(id INTEGER PRIMARY KEY, oid INTEGER, name TEXT)"
    - "INSERT INTO customers VALUES(1, 'alice')"
    - "INSERT INTO orders VALUES(10, 1)"
    - "INSERT INTO items VALUES(100, 10, 'thing')"
  input: |
    SELECT {
        id,
        tags: [1, 2, 3],
        orders: SELECT {
            order_id: id,
            item_names: SELECT [name] FROM items WHERE oid = o.id,
        } FROM orders o WHERE cid = c.id,
    } FROM customers c
  expected:
    - '{"id":1,"tags":[1,2,3],"orders":[{"order_id":10,"item_names":["thing"]}]}'

