- name: "xml empty subquery"
  setup:
    - "CREATE TABLE items(id INTEGER PRIMARY KEY, name TEXT)"
  input: "SELECT <ul>{SELECT <li>{name}</li> FROM items}</ul>"
  expected:
    - "<ul></ul>"

