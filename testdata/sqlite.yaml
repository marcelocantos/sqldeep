# ── Reverse join (<- syntax) ────────────────────────────────────────

- name: "reverse join (many-to-one)"
  setup:
    - "CREATE TABLE customers(customers_id INTEGER PRIMARY KEY, name TEXT)"
    - "CREATE TABLE orders(orders_id INTEGER PRIMARY KEY, customers_id INTEGER, total REAL)"
