- name: "xml with attributes"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY, cls TEXT)"
    - "INSERT INTO t VALUES(1, 'highlight')"
  input: "SELECT <span class={cls}>text</span> FROM t"
  expected:
    - '<span class="highlight">text</span>'

- name: "xml interpolation"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY, name TEXT)"
    - "INSERT INTO t VALUES(1, 'alice')"
  input: "SELECT <td>{name}</td> FROM t"
  expected:
    - "<td>alice</td>"

- name: "xml escaping"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY, val TEXT)"
    - "INSERT INTO t VALUES(1, '<b>bold</b>')"
  input: "SELECT <td>{val}</td> FROM t"
  expected:
    - "<td>&lt;b&gt;bold&lt;/b&gt;</td>"

- name: "xml nested elements"
  setup: []
  input: "SELECT <div><span>inner</span></div>"
  expected:
    - "<div><span>inner</span></div>"

- name: "xml self-closing"
  setup: []
  input: "SELECT <br/>"
  expected:
    - "<br/>"

- name: "xml empty non-void element"
  setup: []
  input: "SELECT <div></div>"
  expected:
    - "<div></div>"

- name: "xml dedent multi-line"
  setup: []
  input: "SELECT <div>\n      <span>text</span>\n    </div>"
  expected:
    - "<div>\n  <span>text</span>\n</div>"

- name: "xml boolean attribute"
  setup: []
  input: "SELECT <input disabled/>"
  expected:
    - "<input disabled/>"

- name: "xml dynamic boolean attribute true"
  setup: []
  raw_sql: "SELECT CAST(xml_element('input/', xml_attrs('checked', sqldeep_json('true'))) AS TEXT)"
  expected:
    - "<input checked/>"

- name: "xml dynamic boolean attribute false"
  setup: []
  raw_sql: "SELECT CAST(xml_element('input/', xml_attrs('checked', sqldeep_json('false'))) AS TEXT)"
  expected:
    - "<input/>"

- name: "xml dynamic boolean attribute integer"
  setup: []
  raw_sql: "SELECT CAST(xml_element('td', xml_attrs('colspan', 1)) AS TEXT)"
  expected:
    - '<td colspan="1"></td>'

- name: "xml subquery"
  setup:
    - "CREATE TABLE items(id INTEGER PRIMARY KEY, name TEXT)"
    - "INSERT INTO items VALUES(1, 'apple')"
    - "INSERT INTO items VALUES(2, 'banana')"
  input: "SELECT <ul>{SELECT <li>{name}</li> FROM items ORDER BY id}</ul>"
