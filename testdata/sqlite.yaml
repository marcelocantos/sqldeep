# ── JSX mode ───────────────────────────────────────────────────────

- name: "jsx static element"
  setup: []
  input: "SELECT jsx(<div>hello</div>)"
  expected:
    - '["div","hello"]'

- name: "jsx string attribute"
  setup: []
  input: 'SELECT jsx(<div class="card">text</div>)'
  expected:
    - '["div",{"class":"card"},"text"]'

- name: "jsx preserves json object attribute"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY, x INTEGER, y INTEGER)"
    - "INSERT INTO t VALUES(1, 10, 20)"
  input: "SELECT jsx(<Graph data={{x, y}}/>) FROM t LIMIT 1"
  expected:
    - '["Graph",{"data":{"x":10,"y":20}}]'

- name: "jsx boolean attribute true"
  setup: []
  input: "SELECT jsx(<input disabled/>)"
  expected:
    - '["input",{"disabled":true}]'

- name: "jsx boolean attribute false"
  setup: []
  input: "SELECT jsx(<input checked={false}/>)"
  expected:
    - '["input",{"checked":false}]'

- name: "jsx mixed static and json attributes"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY)"
    - "INSERT INTO t VALUES(1)"
  input: "SELECT jsx(<Widget title=\"Sales\" config={{color: 'blue'}}/>) FROM t LIMIT 1"
  expected:
    - '["Widget",{"title":"Sales","config":{"color":"blue"}}]'

- name: "jsx subquery aggregation"
  setup:
    - "CREATE TABLE items(id INTEGER PRIMARY KEY, name TEXT)"
    - "INSERT INTO items VALUES(1, 'apple')"
    - "INSERT INTO items VALUES(2, 'banana')"
  input: "SELECT jsx(<ul>{SELECT <li>{name}</li> FROM items ORDER BY id}</ul>)"
  expected:
    - '["ul",["li","apple"],["li","banana"]]'

- name: "jsx direct composition"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY, name TEXT)"
    - "INSERT INTO t VALUES(1, 'hello')"
  input: 'SELECT jsx(<div class="outer">{SELECT <span class="green">{name}</span> FROM t}</div>)'
  expected:
    - '["div",{"class":"outer"},["span",{"class":"green"},"hello"]]'

- name: "jsx view recomposition"
  setup:
    - "CREATE TABLE t(id INTEGER PRIMARY KEY, name TEXT)"
    - "INSERT INTO t VALUES(1, 'hello')"
  steps:
    - transpile_exec: 'CREATE VIEW v_inner AS SELECT jsx(<span class="green">{name}</span>) AS col FROM t'
    - transpile_query: 'SELECT jsx(<div class="outer">{(SELECT col FROM v_inner)}</div>)'
  expected:
    - '["div",{"class":"outer"},["span",{"class":"green"},"hello"]]'
