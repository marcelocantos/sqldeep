# ── Recursive select ────────────────────────────────────────────────

- name: "recursive tree"
  setup:
    - "CREATE TABLE categories(id INTEGER PRIMARY KEY, name TEXT, parent_id INTEGER)"
    - "INSERT INTO categories VALUES(1, 'Root', NULL)"
    - "INSERT INTO categories VALUES(2, 'A', 1)"
    - "INSERT INTO categories VALUES(3, 'B', 1)"
    - "INSERT INTO categories VALUES(4, 'A1', 2)"
  input: |
    SELECT/1 { id, name, children: * }
    FROM categories
    RECURSE ON (parent_id)
    WHERE parent_id IS NULL
  expected:
    - '{"id":1,"name":"Root","children":[{"id":2,"name":"A","children":[{"id":4,"name":"A1","children":[]}]},{"id":3,"name":"B","children":[]}]}'

- name: "recursive forest"
  setup:
    - "CREATE TABLE categories(id INTEGER PRIMARY KEY, name TEXT, parent_id INTEGER)"
    - "INSERT INTO categories VALUES(1, 'Root1', NULL)"
    - "INSERT INTO categories VALUES(2, 'Root2', NULL)"
    - "INSERT INTO categories VALUES(3, 'Child1', 1)"
  input: |
    SELECT { id, name, children: * }
    FROM categories
    RECURSE ON (parent_id)
    WHERE parent_id IS NULL
  expected:
    - '[{"id":1,"name":"Root1","children":[{"id":3,"name":"Child1","children":[]}]},{"id":2,"name":"Root2","children":[]}]'

- name: "recursive empty tree"
  setup:
    - "CREATE TABLE categories(id INTEGER PRIMARY KEY, name TEXT, parent_id INTEGER)"
  input: |
    SELECT/1 { id, name, children: * }
    FROM categories
    RECURSE ON (parent_id)
    WHERE parent_id IS NULL
  expected:
    - "NULL"

# ── FK-guided joins ─────────────────────────────────────────────────

- name: "fk-guided join"
  setup:
    - "CREATE TABLE customers(id INTEGER PRIMARY KEY, name TEXT)"
    - "CREATE TABLE orders(id INTEGER PRIMARY KEY, cust_id INTEGER, total REAL, FOREIGN KEY(cust_id) REFERENCES customers(id))"
    - "INSERT INTO customers VALUES(1, 'alice')"
    - "INSERT INTO orders VALUES(10, 1, 99.5)"
    - "INSERT INTO orders VALUES(11, 1, 42.0)"
  input: |
    SELECT {
        name,
        orders: FROM c->orders o ORDER BY o.id SELECT { total },
    } FROM customers c
  fks:
    - from_table: orders
      to_table: customers
      columns:
        - { from_column: cust_id, to_column: id }
  expected:
    - '{"name":"alice","orders":[{"total":99.5},{"total":42.0}]}'

- name: "fk-guided multi-column join"
  setup:
    - "CREATE TABLE regions(region TEXT, shop TEXT, name TEXT, PRIMARY KEY(region, shop))"
    - "CREATE TABLE sales(id INTEGER PRIMARY KEY, region TEXT, shop TEXT, amount REAL)"
    - "INSERT INTO regions VALUES('east', 'a', 'East A')"
    - "INSERT INTO regions VALUES('east', 'b', 'East B')"
    - "INSERT INTO sales VALUES(1, 'east', 'a', 100.0)"
    - "INSERT INTO sales VALUES(2, 'east', 'a', 200.0)"
    - "INSERT INTO sales VALUES(3, 'east', 'b', 50.0)"
  input: |
    SELECT {
        name,
        sales: FROM r->sales s ORDER BY s.id SELECT { amount },
    } FROM regions r ORDER BY r.region, r.shop
  fks:
    - from_table: sales
      to_table: regions
      columns:
        - { from_column: region, to_column: region }
        - { from_column: shop, to_column: shop }
  expected:
    - '{"name":"East A","sales":[{"amount":100.0},{"amount":200.0}]}'
    - '{"name":"East B","sales":[{"amount":50.0}]}'

# ── XML integration tests ──────────────────────────────────────────

- name: "xml static element"
  setup: []
  input: "SELECT <div>hello</div>"
